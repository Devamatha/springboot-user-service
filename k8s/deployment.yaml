apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-user-service
  labels:
    app: springboot-user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springboot-user-service
  template:
    metadata:
      labels:
        app: springboot-user-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: springboot-user-service
          image: ghcr.io/devamatha/springboot-user-service:latest
          envFrom:
            - configMapRef:
                name: app-setting
            - secretRef:
                name: redis-credentials
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: springboot-user-service
  labels:
    app: springboot-user-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app: springboot-user-service
